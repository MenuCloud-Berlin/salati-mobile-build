name: Android Release APK

# Baut die signierte Release-APK auf einem kostenlosen ubuntu-Runner
# (öffentliches Repo = unbegrenzte Minuten). Kein Windows-260-Zeichen-Pfad-
# Problem hier, daher können auch New-Arch-Native-Libs (Hintergrund-Download)
# gebaut werden. Signing kommt AUSSCHLIESSLICH aus verschlüsselten
# Actions-Secrets — nie aus dem (öffentlichen) Code.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: pnpm installieren
        run: npm install -g pnpm@10.33.0

      - name: pnpm install
        run: pnpm install --no-frozen-lockfile

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Keystore aus Secret dekodieren
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Gradle assembleRelease (signiert)
        working-directory: android
        env:
          ORG_GRADLE_PROJECT_RELEASE_STORE_FILE: ${{ runner.temp }}/release.jks
          ORG_GRADLE_PROJECT_RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          ORG_GRADLE_PROJECT_RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: APK als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: salati-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
